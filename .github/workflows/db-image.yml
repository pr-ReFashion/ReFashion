name: Build & Push DB Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-db:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push (db)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: db/Dockerfile
          push: true
          tags: |
            ghcr.io/emmanuelpintelas/refashion-devdb:latest
            ghcr.io/emmanuelpintelas/refashion-devdb:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
